name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p dist

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "${target}"
            package_name="simple_auth_${VERSION}_${goos}_${goarch}"
            package_dir="dist/${package_name}"
            binary_name="simple_auth"

            if [ "${goos}" = "windows" ]; then
              binary_name="${binary_name}.exe"
            fi

            mkdir -p "${package_dir}"

            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags "-s -w -X main.Name=simple_auth -X main.Version=${VERSION}" \
              -o "${package_dir}/${binary_name}" \
              ./cmd/simple_auth

            cp README.md LICENSE install.sh "${package_dir}/"
            cp -R configs templates deploy doc "${package_dir}/"

            if [ "${goos}" = "windows" ]; then
              (cd dist && zip -qr "${package_name}.zip" "${package_name}")
            else
              (cd dist && tar -czf "${package_name}.tar.gz" "${package_name}")
            fi

            rm -rf "${package_dir}"
          done

          (cd dist && sha256sum *.tar.gz *.zip > SHA256SUMS)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: simple_auth ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
